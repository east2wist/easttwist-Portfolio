<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17120f">
  <title>إيست تويست | شركة تسويق إلكتروني</title>
  <style>
    html,body{margin:0;min-height:100%;background:#17120f;color:#f8f3e9;font-family:Arial,sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .boot strong{display:block;color:#f2d594;font-size:1.35rem;margin-bottom:8px}
    .boot span{color:#c8beb1}
  </style>
</head>
<body>
  <div class="boot"><div><strong>East Twist</strong><span>جارٍ تحميل الصفحة</span></div></div>
  <script>
    (async()=>{
      try{
        const response=await fetch('../digital-marketing/index.html?build=10',{cache:'no-store'});
        if(!response.ok)throw new Error('page load failed');
        let html=await response.text();
        html=html.replace('<head>','<head><base href="../digital-marketing/">');
        html=html.replace(/app-v7\.js\?v=\d+/g,'app-v7.js?v=10');
        html=html.replace(/landing-v7\.css\?v=\d+/g,'landing-v7.css?v=10');
        html=html.replace('</head>','<link rel="stylesheet" href="landing-v8.css?v=10"></head>');
        html=html.replace('https://east2wist.github.io/easttwist-Portfolio/digital-marketing/','https://east2wist.github.io/easttwist-Portfolio/marketing/');
        document.open();
        document.write(html);
        document.close();
      }catch(error){
        document.body.innerHTML='<div class="boot"><div><strong>تعذر تحميل الصفحة</strong><span><a style="color:#f2d594" href="../digital-marketing/?build=10">افتح الصفحة الأساسية</a></span></div></div>';
      }
    })();
  </script>
</body>
</html>
