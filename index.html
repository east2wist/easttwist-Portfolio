<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East Twist</title>

<style>
:root{
  --dark:#231f20;
  --main:#2d2824;
  --gold:#b79d65;
  --light:#f0eee7;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: "Segoe UI", Tahoma;
  background: var(--light);
  color: var(--main);
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  z-index:1000;
}

nav img{width:55px;border-radius:50%}

nav a{
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
  color:var(--dark);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg,#2d2824,#000);
  color:white;
}

.hero h1{
  font-size:60px;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  opacity:0.8;
}

.btn{
  margin-top:25px;
  padding:15px 30px;
  background:var(--gold);
  color:black;
  border-radius:30px;
  display:inline-block;
  font-weight:bold;
}

/* SERVICES */
section{
  padding:80px 20px;
  text-align:center;
}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* YOUTUBE CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding:20px;
}

.video{
  min-width:300px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* SOCIAL */
.social{
  display:flex;
  justify-content:center;
  gap:20px;
}

.social a{
  font-size:25px;
  color:var(--dark);
}

/* FOOTER */
footer{
  background:var(--dark);
  color:white;
  padding:40px;
  text-align:center;
}

</style>
</head>

<body>

<nav>
<img src="logo.png">
<div>
<a href="#services">الخدمات</a>
<a href="#works">الأعمال</a>
<a href="#contact">تواصل</a>
</div>
</nav>

<section class="hero">
<div>
<h1>East Twist</h1>
<p>نصنع حضورك… ونحوّله إلى عملاء</p>
<a href="https://wa.me/966567031077" class="btn">ابدأ الآن</a>
</div>
</section>

<section id="services">
<h2>خدماتنا</h2>
<div class="services">
<div class="card">إدارة السوشيال ميديا</div>
<div class="card">تصوير احترافي</div>
<div class="card">تصميم جرافيك</div>
<div class="card">إعلانات ممولة</div>
</div>
</section>

<section id="works">
<h2>من أعمالنا</h2>
<div class="carousel">

<div class="video">
<iframe width="100%" height="400" src="https://www.youtube.com/embed/nPE3k0dRKOA"></iframe>
</div>

<div class="video">
<iframe width="100%" height="400" src="https://www.youtube.com/embed/qGLANtC3Kgk"></iframe>
</div>

<div class="video">
<iframe width="100%" height="400" src="https://www.youtube.com/embed/ureEF_EOZeM"></iframe>
</div>

</div>
</section>

<section id="contact">
<h2>تواصل معنا</h2>
<p>+966 56 703 1077</p>

<div class="social">
<a href="https://instagram.com/easttwistksa">IG</a>
<a href="https://tiktok.com/@easttwistksa">TT</a>
<a href="https://youtube.com/@east2wist">YT</a>
</div>
</section>

<footer>
<p>© East Twist 2026</p>
</footer>

</body>
</html>
